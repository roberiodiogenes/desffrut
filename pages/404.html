<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada – Dresfrut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../css/config.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-4);
      text-align: center;
      background: var(--gradient-fresh);
    }
    .error-content { max-width: 500px; }
    .error-emoji {
      font-size: 6rem;
      display: block;
      margin-bottom: var(--space-4);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-16px); }
    }
    .error-code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1;
      margin-bottom: var(--space-2);
      opacity: .15;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-primary-dark);
      margin-bottom: var(--space-3);
    }
    .error-desc {
      color: var(--color-text-soft);
      font-size: var(--text-lg);
      margin-bottom: var(--space-8);
      line-height: 1.7;
    }
    .error-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }
    .fruit-trail {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      font-size: 2rem;
    }
    .fruit-trail span {
      animation: fruitBounce 1s ease-in-out infinite;
    }
    .fruit-trail span:nth-child(1) { animation-delay: 0s; }
    .fruit-trail span:nth-child(2) { animation-delay: .15s; }
    .fruit-trail span:nth-child(3) { animation-delay: .3s; }
    .fruit-trail span:nth-child(4) { animation-delay: .45s; }
    .fruit-trail span:nth-child(5) { animation-delay: .6s; }
    @keyframes fruitBounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-10px) rotate(10deg); }
    }
  </style>
</head>
<body data-base-path="../">
  <div id="navbar-slot"></div>

  <main id="main-content">
    <div class="error-page">
      <div class="error-content" style="position:relative">
        <span class="error-code" aria-hidden="true">404</span>
        <div class="fruit-trail" aria-hidden="true">
          <span>🍎</span><span>🍌</span><span>🍊</span><span>🍇</span><span>🥦</span>
        </div>
        <h1 class="error-title">Ops! Página não encontrada</h1>
        <p class="error-desc">
          Parece que essa página se perdeu no caminhão de entregas! 🚚<br>
          Mas não se preocupe — tem muita coisa boa te esperando.
        </p>
        <div class="error-actions">
          <a href="../index.html" class="btn btn-primary btn-lg">🏠 Voltar ao Início</a>
          <a href="pedidos.html" class="btn btn-accent btn-lg">🛒 Fazer Pedido</a>
          <a href="#" data-link="whatsapp" class="btn btn-outline btn-lg" target="_blank" rel="noopener">💬 Falar pelo WhatsApp</a>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/links.js"></script>
  <script src="../data/produtos.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
